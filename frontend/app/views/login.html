<div class="login-wrapper">
    <div class="login-box">

        <div class="login-logo">
            <span class="logo-icon">&#9835;</span>
            <h2>PlaylistApp</h2>
        </div>

        <form ng-submit="login()" novalidate>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input
                    type="email"
                    id="email"
                    class="form-control"
                    ng-model="credentials.email"
                    placeholder="seu@email.com"
                    required
                    autofocus>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    ng-model="credentials.password"
                    placeholder="••••••••"
                    required>
            </div>

            <div class="alert alert-danger mt-sm" ng-if="error">
                {{ error }}
            </div>

            <div class="mt-md">
                <button type="submit" class="btn btn-spotify btn-block" ng-disabled="loading">
                    {{ loading ? 'Entrando...' : 'Entrar' }}
                </button>
            </div>
        </form>
    </div>
</div>
